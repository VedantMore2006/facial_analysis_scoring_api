version: '3.8'

services:
  scoring-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: facial-scoring-api:latest
    container_name: facial-scoring-api
    ports:
      - "8011:8011"
    environment:
      - PYTHONUNBUFFERED=1
      - SCORING_API_KEY=${SCORING_API_KEY}
      - MODEL_DIR=${MODEL_DIR:-reports/model_training/run_20260324_171117}
      - LABEL_COL=${LABEL_COL:-condition_label}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - scoring-network
    labels:
      - "app=facial-scoring-api"
      - "version=1.0.0"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  scoring-network:
    driver: bridge
